defaults:
  git: https://github.com/sciknow-io/alhazen-skill-examples
  ref: main
skills:
- name: alhazen-core
  path: skills/alhazen-core
- name: agentic-memory
  path: skills/agentic-memory
  dashboard:
    enabled: true
    name: Alhazen Notebook
    description: "Browse the knowledge graph \u2014 schema, entities, roles, relations,\
      \ and agent session history."
    url_path: /agentic-memory
    icon: Brain
    color: teal
- name: typedb-notebook
  path: skills/typedb-notebook
- name: web-search
  path: skills/web-search
- name: curation-skill-builder
  path: skills/curation-skill-builder
  dashboard:
    enabled: false
    name: Domain Modeling
    description: Track skill design processes, decisions, gaps, and experiments across
      all knowledge domains.
    url_path: /curation-skill-builder
    icon: Layers
    color: violet
- name: scientific-literature
  subdir: skills/biomed/scientific-literature
  dashboard:
    enabled: true
    name: Scientific Literature
    description: Corpora, paper embeddings, and faceting pipelines.
    url_path: /scientific-literature
    icon: BookOpen
    color: cyan
- name: jobhunt
  subdir: skills/demo/jobhunt
  dashboard:
    enabled: true
    name: Jobhunt
    description: Track job applications, analyze skill gaps, and manage your career
      search.
    url_path: /jobhunt
    icon: Briefcase
    color: indigo
- name: tech-recon
  path: skills/tech-recon
  dashboard:
    enabled: true
    name: Tech Recon
    description: Goal-driven technology investigation with dynamic Observable Plot
      analysis.
    url_path: /tech-recon
    icon: Search
    color: cyan
- name: dismech-notebook
  git: https://github.com/sciknow-io/alhazen-skill-dismech
  ref: main
  subdir: skills/dismech-notebook
  dashboard:
    enabled: true
    name: DisMech Notebook
    description: Rare disease mechanism knowledge mapped into Alhazen notebook memory.
    url_path: /dismech
    icon: Dna
    color: teal
- name: literature-trends
  subdir: skills/biomed/literature-trends
- name: coach
  subdir: skills/health/coach
  dashboard:
    enabled: true
    name: Health Coach
    description: "Personal health & fitness monitoring \u2014 metrics, sleep, workouts,\
      \ goals, appointments."
    url_path: /coach
    icon: Heart
    color: teal
schema_map:
  load_order:
  - agentic-memory
  - coach
  - curation-skill-builder
  - dismech-notebook
  - jobhunt
  - scientific-literature
  - tech-recon
  namespaces:
    nbmem:
      skill: agentic-memory
      schema: skills/agentic-memory/schema.tql
      depends_on: []
    coach:
      skill: coach
      schema: local_skills/coach/schema.tql
      depends_on: []
    dm:
      skill: curation-skill-builder
      schema: skills/curation-skill-builder/schema.tql
      depends_on: []
    jhunt:
      skill: jobhunt
      schema: local_skills/jobhunt/schema.tql
      depends_on: []
    scilit:
      skill: scientific-literature
      schema: local_skills/scientific-literature/schema.tql
      depends_on: []
    trec:
      skill: tech-recon
      schema: skills/tech-recon/schema.tql
      depends_on:
      - scientific-literature
